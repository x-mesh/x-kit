name: x-sync Docker

on:
  push:
    branches: [main]
    paths: ['x-sync/**']
  pull_request:
    paths: ['x-sync/**']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.0). Leave empty for "latest" only.'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: x-sync
          push: false
          tags: jinwoo/x-sync:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: x-sync
          push: true
          tags: |
            jinwoo/x-sync:latest
            ${{ inputs.version && format('jinwoo/x-sync:{0}', inputs.version) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
