name: x-sync Docker

on:
  push:
    paths: ['x-sync/**']
    tags: ['x-sync-v*']
  pull_request:
    paths: ['x-sync/**']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: echo "version=${GITHUB_REF_NAME#x-sync-v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: x-sync
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ghcr.io/x-mesh/x-sync:latest
            ghcr.io/x-mesh/x-sync:${{ steps.version.outputs.version || 'dev' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
